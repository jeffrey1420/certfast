version: '3.8'

services:
  app:
    build:
      context: ../apps/api
      dockerfile: ../../infrastructure/docker/app/Dockerfile
    container_name: certfast-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3333
      - HOST=0.0.0.0
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=certfast
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=certfast
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "3333:3333"
    depends_on:
      - postgres
      - redis
      - clickhouse
    networks:
      - certfast
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: certfast-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=certfast
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=certfast
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - certfast
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certfast"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: certfast-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - certfast
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:23-alpine
    container_name: certfast-clickhouse
    restart: unless-stopped
    environment:
      - CLICKHOUSE_DB=certfast
      - CLICKHOUSE_USER=certfast
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - certfast
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: certfast-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certfast_static:/var/www/static:ro
    depends_on:
      - app
    networks:
      - certfast

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  certfast_static:

networks:
  certfast:
    driver: bridge
