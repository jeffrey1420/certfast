  /tenants/{tenantId}/integrations/{integrationId}:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: integrationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Integrations]
      summary: Get integration details
      responses:
        '200':
          description: Integration details
          content:
            application/json:
