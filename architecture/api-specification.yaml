      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyRequest'
      responses:
        '201':
          description: Policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'

  /tenants/{tenantId}/policies/{policyId}:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: policyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Policies]
      summary: Get policy details
      description: |
        Get policy details including current version content and 
