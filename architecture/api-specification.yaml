            type: string
      responses:
        '200':
          description: List of findings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFindings'

    post:
      tags: [Assessments]
      summary: Create finding
      description: |
        Create a new audit finding. Can be used for internal audits or 
        to record external auditor findings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFindingRequest'
      responses:
        '201':
          description: Finding created

  /tenants/{tenantId}/assessments/{assessmentId}/findings/{findingId}:
    parameters:
      - name: tenantId
