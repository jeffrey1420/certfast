        once approved. Supports AI-generated content.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyVersionRequest'
      responses:
        '201':
          description: Policy version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyVersion'

  /tenants/{tenantId}/policies/{policyId}/versions/{versionId}/approve:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: policyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: versionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    post:
      tags: [Policies]
      summary: Approve policy version
      description: |
        Approve a policy version, making it the current active version. 
