      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
      responses:
        '200':
          description: Version approved

  /tenants/{tenantId}/policies/{policyId}/acknowledge:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: policyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    post:
      tags: [Policies]
      summary: Acknowledge policy
      description: |
        Current user acknowledges the current policy version. Records 
        timestamp and IP for compliance audit trail.
      responses:
        '201':
          description: Policy acknowledged
        '200':
          description: Already acknowledged (current version)

  /tenants/{tenantId}/policies/{policyId}/acknowledgments:
    parameters:
