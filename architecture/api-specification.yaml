        required: true
        schema:
          type: string
          format: uuid
      - name: frameworkId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: controlId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Controls]
      summary: Get control details
      responses:
        '200':
          description: Control details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlDetail'

    patch:
      tags: [Controls]
      summary: Update control
      description: |
        Update a custom control. System controls cannot be modified 
