      summary: List compliance assessments
      description: |
        List all compliance assessments for the tenant with filtering 
        by status and framework.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [in_progress, ready_for_review, audit_scheduled, audit_in_progress, compliant, non_compliant, remediation_required]
        - name: framework_id
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
