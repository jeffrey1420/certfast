        - name: owner_id
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of policies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPolicies'

    post:
      tags: [Policies]
      summary: Create policy
      description: |
        Create a new policy with initial content. The policy starts 
