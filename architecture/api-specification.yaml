          description: Finding updated

  # ============================================================================
  # EVIDENCE
  # ============================================================================
  /tenants/{tenantId}/evidence:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Evidence]
      summary: List evidence files
      description: |
        List evidence files with filtering by type, linked controls, 
        and full-text search.
      parameters:
        - name: evidence_type
          in: query
          schema:
            type: string
            enum: [policy, procedure, screenshot, log, configuration, certificate, audit_report, training_record, vendor_assessment, incident_report, other]
        - name: control_id
          in: query
          schema:
            type: string
            format: uuid
            description: Filter by linked control implementation
        - name: search
          in: query
          schema:
            type: string
            description: Full-text search on filename and description
        - name: tags
          in: query
          schema:
            type: string
            description: Comma-separated tags to filter by
        - name: uploaded_by
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
        - name: include_deleted
          in: query
          schema:
            type: boolean
            default: false
            description: Include soft-deleted files (admin only)
      responses:
        '200':
          description: List of evidence files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEvidence'

    post:
      tags: [Evidence]
      summary: Upload evidence
      description: |
        Upload an evidence file. Files are stored in S3 with encryption 
        and integrity verification (SHA-256 hash).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload (max 100MB)
                evidence_type:
                  type: string
                  enum: [policy, procedure, screenshot, log, configuration, certificate, audit_report, training_record, vendor_assessment, incident_report, other]
                  description: Type of evidence
                description:
                  type: string
                  maxLength: 2000
                tags:
                  type: string
                  description: Comma-separated tags
                control_ids:
                  type: string
                  description: Comma-separated control implementation IDs to link
                link_type:
                  type: string
                  enum: [supporting, primary, test_result, reference]
                  default: supporting
      responses:
        '201':
          description: Evidence uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceFile'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Storage limit reached for tier

  /tenants/{tenantId}/evidence/{evidenceId}:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: evidenceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Evidence]
      summary: Get evidence details
      description: |
        Get evidence file details including metadata, linked controls, 
        and download URL.
      responses:
        '200':
          description: Evidence details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceFileDetail'

    patch:
      tags: [Evidence]
      summary: Update evidence metadata
      description: Update description, tags, or linked controls.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEvidenceRequest'
      responses:
        '200':
          description: Evidence updated

    delete:
      tags: [Evidence]
      summary: Delete evidence
      description: |
        Soft delete an evidence file. Files are retained per the 
        tenant's retention policy before permanent deletion.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for deletion (audit trail)
      responses:
        '204':
          description: Evidence marked for deletion

  /tenants/{tenantId}/evidence/{evidenceId}/download:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: evidenceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Evidence]
      summary: Get download URL
      description: |
        Returns a presigned S3 URL valid for 15 minutes. Use this URL 
        to download the file directly from S3.
      responses:
        '200':
          description: Download URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  download_url:
                    type: string
                    format: uri
                  expires_at:
                    type: string
                    format: date-time

  /tenants/{tenantId}/evidence/{evidenceId}/controls/{controlImplementationId}:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: evidenceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: controlImplementationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    post:
      tags: [Evidence]
      summary: Link evidence to control
      description: |
        Create a link between an evidence file and a control implementation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                link_type:
                  type: string
                  enum: [supporting, primary, test_result, reference]
                  default: supporting
                notes:
                  type: string
      responses:
        '201':
          description: Link created

    delete:
      tags: [Evidence]
      summary: Unlink evidence from control
      responses:
        '204':
          description: Link removed

  # ============================================================================
  # POLICIES
  # ============================================================================
  /tenants/{tenantId}/policies:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Policies]
      summary: List policies
      description: List all policies with filtering by category and status.
      parameters:
        - name: category
          in: query
          schema:
            type: string
