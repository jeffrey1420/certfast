        code:
          type: string
          example: "soc2"
        version:
          type: string
          example: "2017"
        description:
          type: string
        authority:
          type: string
          example: "AICPA"
        category:
          type: string
          enum: [security, privacy, availability, processing_integrity, confidentiality, resilience]
        jurisdiction:
          type: string
          example: "US"
        certification_validity_months:
          type: integer
          nullable: true
        requires_external_audit:
          type: boolean
        is_system:
          type: boolean
        is_custom:
          type: boolean
        is_active:
          type: boolean
        control_count:
          type: integer
        created_at:
          type: string
