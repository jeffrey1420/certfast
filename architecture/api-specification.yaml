      description: Update policy metadata (not content). Use versions for content changes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePolicyRequest'
      responses:
        '200':
          description: Policy updated

    delete:
      tags: [Policies]
      summary: Delete policy
      description: Soft delete a policy. Cannot delete if referenced by assessments.
