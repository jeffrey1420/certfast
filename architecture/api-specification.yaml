          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Control'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags: [Controls]
      summary: Create custom control
      description: |
        Create a custom control within a custom framework. Cannot add 
        controls to system frameworks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateControlRequest'
      responses:
        '201':
