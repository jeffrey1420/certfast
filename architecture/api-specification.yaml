      summary: Update integration
      description: Update integration settings and configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIntegrationRequest'
      responses:
        '200':
          description: Integration updated

    delete:
      tags: [Integrations]
      summary: Remove integration
      description: |
        Permanently removes an integration and all associated automated 
        evidence collection configurations.
      responses:
        '204':
          description: Integration removed

  /tenants/{tenantId}/integrations/{integrationId}/connect:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: integrationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    post:
      tags: [Integrations]
      summary: Complete OAuth connection
      description: |
        Complete OAuth flow by providing authorization code from provider.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: OAuth authorization code
      responses:
        '200':
          description: Connection successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Integration'

  /tenants/{tenantId}/integrations/{integrationId}/sync:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: integrationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    post:
      tags: [Integrations]
      summary: Trigger manual sync
      description: |
        Trigger a manual synchronization with the integrated service. 
        Rate limited per integration.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sync_type:
                  type: string
                  enum: [evidence_collection, user_sync, compliance_check, full]
                  default: evidence_collection
      responses:
        '202':
          description: Sync job queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  sync_id:
                    type: string
                    format: uuid

  /tenants/{tenantId}/integrations/{integrationId}/logs:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: integrationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Integrations]
      summary: Get sync logs
      description: |
        Get synchronization logs for the integration with details on 
        records processed and any errors.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [success, partial, failure, in_progress]
      responses:
        '200':
          description: Sync logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IntegrationSyncLog'

  # ============================================================================
  # WEBHOOKS
  # ============================================================================
  /tenants/{tenantId}/webhooks:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Webhooks]
      summary: List webhooks
      description: List all configured webhooks for the tenant.
      parameters:
        - name: is_active
          in: query
          schema:
            type: boolean
        - name: event
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of webhooks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWebhooks'

    post:
      tags: [Webhooks]
      summary: Create webhook
      description: |
        Create a new webhook endpoint. A secret will be generated for 
        HMAC signature verification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookWithSecret'

  /tenants/{tenantId}/webhooks/{webhookId}:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: webhookId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Webhooks]
      summary: Get webhook details
      responses:
        '200':
          description: Webhook details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookDetail'

    patch:
      tags: [Webhooks]
      summary: Update webhook
      description: Update webhook URL, events, or status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookRequest'
      responses:
        '200':
          description: Webhook updated

    delete:
      tags: [Webhooks]
      summary: Delete webhook
      responses:
        '204':
          description: Webhook deleted

  /tenants/{tenantId}/webhooks/{webhookId}/regenerate-secret:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: webhookId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    post:
      tags: [Webhooks]
      summary: Regenerate webhook secret
      description: |
        Generate a new webhook secret. The old secret will be invalidated 
        immediately. Use if secret is compromised.
      responses:
        '200':
          description: New secret generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret:
                    type: string

  /tenants/{tenantId}/webhooks/{webhookId}/deliveries:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: webhookId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Webhooks]
      summary: List webhook delivery attempts
      description: |
        Get delivery logs for a webhook including request/response details 
        and retry attempts.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
        - name: success
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Delivery logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookDelivery'

  /tenants/{tenantId}/webhooks/{webhookId}/test:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: webhookId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    post:
      tags: [Webhooks]
      summary: Send test webhook
      description: |
        Send a test webhook event to verify endpoint configuration. 
        Returns the delivery result including response status.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                event_type:
                  type: string
                  default: "compliance.assessment.created"
      responses:
        '200':
          description: Test delivery result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  response_status:
                    type: integer
                  response_time_ms:
                    type: integer
                  error_message:
                    type: string

  # ============================================================================
  # REPORTS
  # ============================================================================
  /tenants/{tenantId}/reports/compliance-status:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Reports]
      summary: Get overall compliance status
      description: |
        Get a summary of compliance status across all frameworks including 
        open findings and upcoming reviews.
      responses:
        '200':
          description: Compliance status report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceStatusReport'

  /tenants/{tenantId}/reports/assessments/{assessmentId}/audit-package:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: assessmentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Reports]
      summary: Generate audit package
      description: |
        Generate a complete audit package as a ZIP file containing all 
        evidence, policies, control implementations, and findings for 
        an assessment. Returns a presigned URL valid for 24 hours.
      responses:
        '200':
          description: Audit package ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  download_url:
                    type: string
                    format: uri
                  expires_at:
                    type: string
                    format: date-time
                  file_size_bytes:
                    type: integer

  /tenants/{tenantId}/reports/assessments/{assessmentId}/progress:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: assessmentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Reports]
      summary: Get assessment progress report
      description: |
        Get detailed progress metrics for an assessment including 
        control status breakdown and timeline.
      responses:
        '200':
          description: Progress report
          content:
            application/json:
              schema:
                type: object
                properties:
                  assessment_id:
                    type: string
                    format: uuid
                  framework_name:
                    type: string
                  overall_progress:
                    type: number
                    format: percentage
                  status_breakdown:
                    type: object
                    properties:
                      not_started:
                        type: integer
                      in_progress:
                        type: integer
                      implemented:
                        type: integer
                      tested:
                        type: integer
                      compliant:
                        type: integer
                      non_compliant:
                        type: integer
                      not_applicable:
                        type: integer
                  timeline:
                    type: object
                    properties:
                      start_date:
                        type: string
                        format: date
                      target_date:
                        type: string
                        format: date
                      days_remaining:
                        type: integer
                      is_on_track:
                        type: boolean

  /tenants/{tenantId}/reports/policy-acknowledgments:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Reports]
      summary: Get policy acknowledgment report
      description: |
        Get a report of policy acknowledgment status across all users 
        and required policies.
      responses:
        '200':
          description: Policy acknowledgment report
          content:
            application/json:
              schema:
                type: object
                properties:
                  policies:
                    type: array
                    items:
                      type: object
                      properties:
                        policy_id:
                          type: string
                          format: uuid
                        policy_title:
                          type: string
                        acknowledgment_rate:
                          type: number
                          format: percentage
                        pending_users:
                          type: integer
                        total_users:
                          type: integer

  # ============================================================================
  # AUDIT LOGS
  # ============================================================================
  /tenants/{tenantId}/audit-logs:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Audit Logs]
      summary: Get tenant audit logs
      description: |
        Get security audit logs for the tenant. Requires admin or 
        auditor role. Supports filtering by activity type and date range.
      parameters:
        - name: activity_type
          in: query
          schema:
            type: string
            enum: [login, logout, password_change, mfa_enabled, mfa_disabled, 
                   api_key_created, api_key_revoked, invitation_accepted, 
                   account_locked, account_unlocked, suspicious_activity,
                   evidence_downloaded, policy_acknowledged, finding_created,
                   finding_resolved, assessment_status_changed]
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 500
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogs'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token from login or API key

  schemas:
    # ============================================================================
    # COMMON
    # ============================================================================
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: "insufficient_tier"
            message:
              type: string
              example: "This feature requires Pro tier or higher"
            details:
              type: object
              additionalProperties: true

    Pagination:
      type: object
      properties:
        next_cursor:
          type: string
          nullable: true
          example: "eyJpZCI6IjEyMyJ9"
        has_more:
          type: boolean
          example: true

    # ============================================================================
    # AUTHENTICATION
    # ============================================================================
    RegisterRequest:
      type: object
      required: [tenant_name, tenant_slug, billing_email, admin_email, admin_password, admin_first_name, admin_last_name, tier_code]
      properties:
        tenant_name:
          type: string
          maxLength: 255
          example: "Acme Corporation"
        tenant_slug:
          type: string
          pattern: '^[a-z0-9-]+$'
          maxLength: 100
          example: "acme-corp"
        billing_email:
          type: string
          format: email
          example: "billing@acme.com"
        admin_email:
          type: string
          format: email
          example: "admin@acme.com"
        admin_password:
          type: string
          format: password
          minLength: 12
          example: "SecurePass123!"
        admin_first_name:
          type: string
          maxLength: 100
          example: "John"
        admin_last_name:
          type: string
          maxLength: 100
          example: "Doe"
        tier_code:
          type: string
          enum: [lite, starter, pro, enterprise]
          example: "starter"
        company_size:
          type: string
          enum: ["1-15", "15-50", "50-100", "100+"]
          example: "15-50"
        industry:
          type: string
          example: "SaaS"
        timezone:
          type: string
          default: "Europe/Paris"
          example: "Europe/Berlin"

    RegisterResponse:
      type: object
      properties:
        tenant:
          $ref: '#/components/schemas/Tenant'
        user:
          $ref: '#/components/schemas/User'
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          example: 3600

    LoginResponse:
      type: object
      required: [access_token, refresh_token, expires_in, token_type, user, tenant]
      properties:
        access_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expires_in:
          type: integer
          example: 3600
        token_type:
          type: string
          example: "Bearer"
        user:
          $ref: '#/components/schemas/User'
        tenant:
          $ref: '#/components/schemas/Tenant'
        mfa_required:
          type: boolean
          description: True if MFA verification is required

    TokenResponse:
      type: object
      required: [access_token, expires_in, token_type]
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
          example: 3600
        token_type:
          type: string
          example: "Bearer"

    # ============================================================================
    # API KEYS
    # ============================================================================
    ApiKey:
      type: object
      required: [id, name, key_prefix, scopes, is_active, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Production API Key"
        description:
          type: string
        key_prefix:
          type: string
          example: "cf_live_"
        scopes:
          type: array
          items:
            type: string
          example: ["evidence:read", "evidence:write", "assessments:read"]
        rate_limit_override:
          type: integer
          nullable: true
        is_active:
          type: boolean
        last_used_at:
          type: string
          format: date-time
          nullable: true
        usage_count:
          type: integer
          example: 15420
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid

    ApiKeyWithSecret:
      allOf:
        - $ref: '#/components/schemas/ApiKey'
        - type: object
          properties:
            key:
              type: string
              description: Full API key - only shown once
              example: "cf_live_abc123xyz789"

    CreateApiKeyRequest:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
        scopes:
          type: array
          items:
            type: string
            enum: ["evidence:read", "evidence:write", "evidence:delete",
                   "policies:read", "policies:write",
                   "assessments:read", "assessments:write",
                   "users:read", "users:write",
                   "integrations:read", "integrations:write",
                   "webhooks:read", "webhooks:write",
                   "reports:read", "audit_logs:read"]
        expires_at:
          type: string
          format: date-time

    UpdateApiKeyRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        scopes:
          type: array
          items:
            type: string
        is_active:
          type: boolean

    PaginatedApiKeys:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApiKey'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # ============================================================================
    # TENANTS
    # ============================================================================
    Tenant:
      type: object
      required: [id, name, slug, status, tier_id, tier_name, data_region, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Acme Corporation"
        slug:
          type: string
          example: "acme-corp"
        status:
          type: string
          enum: [active, suspended, cancelled]
        tier_id:
          type: string
          format: uuid
        tier_name:
          type: string
          enum: [Lite, Starter, Pro, Enterprise]
        tier_code:
          type: string
          enum: [lite, starter, pro, enterprise]
        billing_email:
          type: string
          format: email
        technical_contact_email:
          type: string
          format: email
        company_size:
          type: string
          enum: ["1-15", "15-50", "50-100", "100+"]
        industry:
          type: string
        timezone:
          type: string
          example: "Europe/Paris"
        data_region:
          type: string
          enum: [eu-west-1, eu-central-1]
          example: "eu-west-1"
        gdpr_compliant:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TenantDetail:
      allOf:
        - $ref: '#/components/schemas/Tenant'
        - type: object
          properties:
            subscription:
              $ref: '#/components/schemas/Subscription'

    UpdateTenantRequest:
      type: object
      properties:
        name:
          type: string
        billing_email:
          type: string
          format: email
        technical_contact_email:
          type: string
          format: email
        company_size:
          type: string
          enum: ["1-15", "15-50", "50-100", "100+"]
        industry:
          type: string
        timezone:
          type: string

    Subscription:
      type: object
      required: [id, tier_id, tier_name, billing_cycle, status, current_period_ends_at]
      properties:
        id:
          type: string
          format: uuid
        tier_id:
          type: string
          format: uuid
        tier_name:
          type: string
        billing_cycle:
          type: string
          enum: [monthly, annual]
        status:
          type: string
          enum: [trialing, active, past_due, cancelled, expired]
        trial_ends_at:
          type: string
          format: date-time
          nullable: true
        current_period_started_at:
          type: string
          format: date-time
        current_period_ends_at:
          type: string
          format: date-time

    SubscriptionDetail:
      allOf:
        - $ref: '#/components/schemas/Subscription'
        - type: object
          properties:
            limits:
              type: object
              properties:
                max_users:
                  type: integer
                  nullable: true
                max_integrations:
                  type: integer
                  nullable: true
                max_frameworks:
                  type: integer
                  nullable: true
                max_evidence_files:
                  type: integer
                  nullable: true
                evidence_retention_days:
                  type: integer
                api_requests_per_hour:
                  type: integer
            usage:
              type: object
              properties:
                current_user_count:
                  type: integer
                current_integration_count:
                  type: integer
                current_evidence_count:
                  type: integer
                storage_bytes_used:
                  type: integer

    UsageStatistics:
      type: object
      properties:
        period:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
        api_requests:
          type: object
          properties:
            total:
              type: integer
            by_endpoint:
              type: object
              additionalProperties:
                type: integer
        storage:
          type: object
          properties:
            total_bytes:
              type: integer
            by_evidence_type:
              type: object
              additionalProperties:
                type: integer

    PaginatedTenants:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # ============================================================================
    # USERS
    # ============================================================================
    User:
      type: object
      required: [id, tenant_id, email, first_name, last_name, role, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          enum: [owner, admin, compliance_officer, auditor, member]
        status:
          type: string
          enum: [active, pending, suspended, inactive]
        job_title:
          type: string
        department:
          type: string
        mfa_enabled:
          type: boolean
        last_login_at:
          type: string
          format: date-time
          nullable: true
        email_notifications_enabled:
          type: boolean
        weekly_digest_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time

    UserDetail:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            pending_acks:
              type: array
              items:
                type: object
                properties:
                  policy_id:
                    type: string
                    format: uuid
                  policy_title:
                    type: string

    InviteUserRequest:
      type: object
      required: [email, first_name, last_name, role]
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          enum: [admin, compliance_officer, auditor, member]
        job_title:
          type: string
        department:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        first_name:
          type: string
