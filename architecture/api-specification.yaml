    # ============================================================================
    # EVIDENCE
    # ============================================================================
    EvidenceFile:
      type: object
      required: [id, filename, original_filename, file_size_bytes, mime_type, evidence_type, uploaded_by, created_at]
      properties:
        id:
          type: string
