        '204':
          description: Policy deleted

  /tenants/{tenantId}/policies/{policyId}/versions:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: policyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      tags: [Policies]
      summary: List policy versions
      description: List all versions of a policy with approval status.
      responses:
        '200':
          description: List of policy versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
